<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop – SivaSakthi Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--dark:#0A0A0F;--dark2:#111118;--dark3:#18181F;--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6F2E;--text:#F0EDE8;--muted:rgba(240,237,232,0.5);--faint:rgba(240,237,232,0.2);--success:rgba(46,213,115,0.9);--danger:rgba(255,107,107,0.9);--warning:rgba(255,165,0,0.9);--info:rgba(74,144,226,0.9);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} html{scroll-behavior:smooth;}
    body{font-family:"Outfit",sans-serif;background:#0A0A0F;color:#F0EDE8;min-height:100vh;}
    .bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);}
    .orb1{width:600px;height:600px;background:rgba(201,168,76,0.07);top:-200px;right:-150px;}
    .orb2{width:500px;height:500px;background:rgba(201,168,76,0.05);bottom:-150px;left:-150px;}
    nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 48px);max-width:1280px;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:rgba(10,10,15,0.9);backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,0.2);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);transition:box-shadow 0.3s;}
    nav.scrolled{box-shadow:0 12px 56px rgba(0,0,0,0.6);}
    .brand{display:flex;align-items:center;gap:11px;text-decoration:none;}
    .brand-mono{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,#8B6F2E,#C9A84C);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(201,168,76,0.3);}
    .brand-mono span{font-family:"Cinzel",serif;font-weight:700;font-size:13px;color:#0A0A0F;line-height:1;}
    .brand-mono small{font-size:6px;color:rgba(10,10,15,0.5);letter-spacing:1px;text-transform:uppercase;}
    .brand-name{font-family:"Cinzel",serif;font-size:15px;font-weight:600;color:#E8C97A;}
    .brand-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
    .nav-btn{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-radius:8px;border:1px solid rgba(201,168,76,0.18);background:transparent;cursor:pointer;font-family:"Outfit",sans-serif;transition:all 0.2s;text-decoration:none;display:inline-block;}
    .nav-btn:hover{color:#E8C97A;border-color:#C9A84C;}
    .btn-gold{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#8B6F2E,#C9A84C);color:#0A0A0F;padding:11px 22px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;font-family:"Outfit",sans-serif;transition:all 0.25s;text-decoration:none;box-shadow:0 4px 18px rgba(201,168,76,0.25);}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.4);}
    .btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .btn-ghost{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);border:1px solid rgba(201,168,76,0.18);color:#E8C97A;padding:10px 18px;border-radius:9px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"Outfit",sans-serif;transition:all 0.2s;text-decoration:none;}
    .btn-ghost:hover{background:rgba(201,168,76,0.08);border-color:#C9A84C;}
    .btn-danger{background:rgba(220,53,69,0.12);color:rgba(255,107,107,0.9);border:1px solid rgba(220,53,69,0.25);border-radius:7px;padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"Outfit",sans-serif;transition:all 0.2s;}
    .btn-danger:hover{background:rgba(220,53,69,0.22);}
    .fgroup{margin-bottom:14px;}
    .fgroup label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C9A84C;margin-bottom:7px;}
    .fgroup input,.fgroup textarea,.fgroup select{width:100%;padding:12px 14px;border-radius:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.14);font-family:"Outfit",sans-serif;font-size:14px;color:#F0EDE8;outline:none;transition:all 0.2s;}
    .fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus{border-color:rgba(201,168,76,0.45);background:rgba(201,168,76,0.04);box-shadow:0 0 0 3px rgba(201,168,76,0.09);}
    .fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--faint);}
    .fgroup select option{background:#111118;}
    .fgroup textarea{resize:vertical;min-height:80px;}
    .badge{display:inline-block;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
    .badge-success{background:rgba(46,213,115,0.12);color:var(--success);border:1px solid rgba(46,213,115,0.25);}
    .badge-danger{background:rgba(255,107,107,0.12);color:var(--danger);border:1px solid rgba(255,107,107,0.25);}
    .badge-warning{background:rgba(255,165,0,0.12);color:var(--warning);border:1px solid rgba(255,165,0,0.25);}
    .badge-info{background:rgba(74,144,226,0.12);color:var(--info);border:1px solid rgba(74,144,226,0.25);}
    .badge-gold{background:rgba(201,168,76,0.12);color:#C9A84C;border:1px solid rgba(201,168,76,0.25);}
    .tbl{width:100%;border-collapse:collapse;}
    .tbl th{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C9A84C;border-bottom:1px solid rgba(201,168,76,0.12);text-align:left;}
    .tbl td{padding:13px 14px;font-size:13px;color:#F0EDE8;border-bottom:1px solid rgba(255,255,255,0.04);}
    .tbl tr:hover td{background:rgba(201,168,76,0.025);}
    .toast{position:fixed;bottom:26px;right:26px;z-index:9999;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:13px 18px;font-size:13px;color:#E8C97A;box-shadow:0 12px 40px rgba(0,0,0,0.5);transform:translateY(80px);opacity:0;transition:all 0.35s;pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .loading{text-align:center;padding:48px;color:var(--muted);font-size:14px;}
    .spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,0.15);border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .page{padding:96px 5vw 60px;position:relative;z-index:1;}
    .page-header{margin-bottom:32px;}
    .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:10px;}
    .eyebrow-dot{width:6px;height:6px;border-radius:50%;background:#C9A84C;box-shadow:0 0 8px #C9A84C;animation:pulse 2.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
    .eyebrow-text{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C9A84C;}
    .page-title{font-family:"Cinzel",serif;font-size:clamp(26px,3vw,42px);font-weight:600;color:#F0EDE8;margin-bottom:8px;}
    .page-title span{color:#C9A84C;}
    .page-desc{font-size:14px;color:var(--muted);line-height:1.75;max-width:520px;}
    .rv{opacity:0;transform:translateY(28px);transition:opacity 0.65s ease,transform 0.65s ease;}
    .rv.in{opacity:1;transform:translateY(0);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:#111118;border:1px solid rgba(201,168,76,0.25);border-radius:22px;padding:44px 36px;max-width:420px;width:100%;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,0.6);}
    .modal-icon{font-size:52px;margin-bottom:14px;}
    .modal-title{font-family:"Cinzel",serif;font-size:22px;font-weight:700;color:#E8C97A;margin-bottom:8px;}
    .modal-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
    @media(max-width:640px){
      nav{width:calc(100% - 20px);top:10px;padding:0 14px;}
      .brand-name,.brand-sub{display:none;}
      .page{padding:80px 4vw 100px;}
      .filter-bar{flex-direction:column;align-items:stretch;}
      .search-wrap{width:100%;}
      .pgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
      .pvisual{height:100px;}
      .pbody{padding:12px 14px 14px;}
      .pname{font-size:14px;}
      .pprice{font-size:16px;}
      .cart-fab{bottom:20px;right:16px;padding:12px 18px;font-size:12px;}
      /* Profile dropdown — position left on mobile */
      .profile-dropdown{right:auto;left:0;}
    }
    @media(max-width:400px){
      .pgrid{grid-template-columns:1fr 1fr;}
    }

    .filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .filter-tabs{display:flex;gap:7px;flex-wrap:wrap;}
    .filt{padding:8px 18px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.15);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all 0.2s;}
    .filt.on,.filt:hover{background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-color:var(--gold);color:var(--dark);}
    .search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.14);border-radius:10px;padding:0 14px;width:230px;}
    .search-wrap input{background:transparent;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);padding:10px 0;width:100%;}
    .search-wrap input::placeholder{color:var(--faint);}
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
    .pcard{border-radius:18px;overflow:hidden;background:rgba(255,255,255,0.035);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,0.12);transition:all 0.35s;}
    .pcard:hover{transform:translateY(-6px);border-color:rgba(201,168,76,0.32);box-shadow:0 24px 56px rgba(0,0,0,0.45);}
    .pvisual{height:120px;position:relative;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,0.04);border-bottom:1px solid rgba(201,168,76,0.09);overflow:hidden;}
    .pvisual img{width:100%;height:100%;object-fit:contain;transition:transform 0.4s;}
    .pcard:hover .pvisual img{transform:scale(1.06);}
    .pvisual-emoji{font-size:36px;}
    .ptag{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--dark);font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
    .pbody{padding:16px 18px 18px;}
    .pcat{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
    .pname{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px;}
    .pdesc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
    .pfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .pprice{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);}
    .pprice small{font-size:11px;font-weight:400;color:var(--muted);}
    .add-btn{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--dark);padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
    .add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(201,168,76,0.32);}
    .add-btn.added{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.3);box-shadow:none;}
    .cart-fab{position:fixed;bottom:28px;right:28px;z-index:300;display:none;align-items:center;gap:10px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--dark);padding:14px 22px;border-radius:100px;font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 8px 32px rgba(201,168,76,0.4);transition:all 0.25s;}
    .cart-fab:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(201,168,76,0.5);}
    .cart-fab-count{background:var(--dark);color:var(--gold);width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;}
    .empty-state{text-align:center;padding:80px 20px;}
    .empty-state .ei{font-size:48px;margin-bottom:14px;}
    .empty-state p{color:var(--muted);font-size:14px;}

    /* ── PROFILE AVATAR ── */
    .profile-wrap{position:relative;}
    .avatar{width:40px;height:40px;border-radius:50%;border:2px solid rgba(201,168,76,0.4);cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8B6F2E,#C9A84C);transition:border-color 0.2s;flex-shrink:0;}
    .avatar:hover{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.15);}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .avatar-init{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#0A0A0F;line-height:1;}
    /* Dropdown panel */
    .profile-dropdown{position:absolute;top:calc(100% + 12px);right:0;width:280px;background:#111118;border:1px solid rgba(201,168,76,0.22);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,0.7);z-index:9000;opacity:0;transform:translateY(-8px) scale(0.97);pointer-events:none;transition:all 0.22s;max-height:90vh;overflow-y:auto;}
    .profile-dropdown.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
    /* Header */
    .pd-head{padding:20px 18px 16px;text-align:center;border-bottom:1px solid rgba(201,168,76,0.1);}
    .pd-avatar{width:64px;height:64px;border-radius:50%;border:2px solid rgba(201,168,76,0.4);overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8B6F2E,#C9A84C);margin:0 auto 12px;position:relative;}
    .pd-avatar img{width:100%;height:100%;object-fit:cover;}
    .pd-avatar-init{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#0A0A0F;}
    .pd-name{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#E8C97A;margin-bottom:3px;}
    .pd-email{font-size:11px;color:var(--muted);word-break:break-all;}
    .pd-phone{font-size:11px;color:var(--muted);margin-top:3px;}
    .pd-since{font-size:10px;color:var(--faint);margin-top:4px;letter-spacing:0.5px;}
    .pd-img-btn{display:inline-flex;align-items:center;gap:5px;margin-top:11px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#C9A84C;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:6px 12px;cursor:pointer;transition:all 0.2s;}
    .pd-img-btn:hover{background:rgba(201,168,76,0.18);}
    .pd-img-input{display:none;}
    /* Stats row */
    .pd-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid rgba(201,168,76,0.08);}
    .pd-stat{padding:12px 8px;text-align:center;}
    .pd-stat+.pd-stat{border-left:1px solid rgba(201,168,76,0.08);}
    .pd-stat-num{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#C9A84C;}
    .pd-stat-lbl{font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    /* Edit info section */
    .pd-section{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,0.07);}
    .pd-section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
    .pd-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .pd-edit-row:last-child{margin-bottom:0;}
    .pd-edit-icon{font-size:14px;width:18px;flex-shrink:0;text-align:center;}
    .pd-edit-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.12);border-radius:7px;padding:8px 10px;font-family:'Outfit',sans-serif;font-size:12px;color:#F0EDE8;outline:none;transition:all 0.2s;}
    .pd-edit-input:focus{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.04);}
    .pd-save-btn{width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#8B6F2E,#C9A84C);font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#0A0A0F;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .pd-save-btn:hover{transform:translateY(-1px);}
    .pd-save-msg{font-size:11px;text-align:center;margin-top:6px;color:#C9A84C;min-height:16px;}
    /* Menu */
    .pd-menu{padding:8px;}
    .pd-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.18s;text-decoration:none;text-align:left;}
    .pd-item:hover{background:rgba(201,168,76,0.07);color:#E8C97A;}
    .pd-item.danger{color:rgba(255,107,107,0.8);}
    .pd-item.danger:hover{background:rgba(255,107,107,0.07);color:rgba(255,107,107,1);}
    .pd-item .pdi{font-size:15px;width:20px;text-align:center;}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav id="topNav">
  <a href="index.html" class="brand">
    <div class="brand-mono"><span>SS</span><small>MKT</small></div>
    <div><div class="brand-name">SivaSakthi Marketing</div><div class="brand-sub">Wholesale &amp; Retail</div></div>
  </a>
  <div class="profile-wrap">
    <div class="avatar" id="navAvatar" onclick="toggleDropdown()">
      <span class="avatar-init" id="avatarInit">?</span>
    </div>
    <div class="profile-dropdown" id="profileDropdown">
      <!-- Header: avatar + name + email + phone -->
      <div class="pd-head">
        <div class="pd-avatar" id="pdAvatar">
          <span class="pd-avatar-init" id="pdInit">?</span>
        </div>
        <div class="pd-name" id="pdName">—</div>
        <div class="pd-email" id="pdEmail"></div>
        <div class="pd-phone" id="pdPhone"></div>
        <div class="pd-since" id="pdSince"></div>
        <label class="pd-img-btn">
          📷 Change Photo
          <input class="pd-img-input" type="file" accept="image/*" onchange="uploadProfilePhoto(this)"/>
        </label>
      </div>

      <!-- Stats: orders / cart items / member days -->
      <div class="pd-stats">
        <div class="pd-stat"><div class="pd-stat-num" id="pdStatOrders">—</div><div class="pd-stat-lbl">Orders</div></div>
        <div class="pd-stat"><div class="pd-stat-num" id="pdStatCart">0</div><div class="pd-stat-lbl">In Cart</div></div>
        <div class="pd-stat"><div class="pd-stat-num" id="pdStatDays">—</div><div class="pd-stat-lbl">Days</div></div>
      </div>

      <!-- Edit profile -->
      <div class="pd-section">
        <div class="pd-section-title">Edit Profile</div>
        <div class="pd-edit-row"><span class="pd-edit-icon">👤</span><input class="pd-edit-input" id="editName"  type="text"  placeholder="Full name"/></div>
        <div class="pd-edit-row"><span class="pd-edit-icon">📞</span><input class="pd-edit-input" id="editPhone" type="tel"   placeholder="Phone number"/></div>
        <div class="pd-edit-row"><span class="pd-edit-icon">🏠</span><input class="pd-edit-input" id="editAddr"  type="text"  placeholder="Default delivery address"/></div>
        <div class="pd-edit-row"><span class="pd-edit-icon">🏙️</span><input class="pd-edit-input" id="editCity"  type="text"  placeholder="City / Town"/></div>
        <div class="pd-edit-row"><span class="pd-edit-icon">📮</span><input class="pd-edit-input" id="editPin"   type="text"  placeholder="Pincode"/></div>
        <button class="pd-save-btn" onclick="saveProfile()">💾 Save Changes</button>
        <div class="pd-save-msg" id="pdSaveMsg"></div>
      </div>

      <!-- Navigation menu -->
      <div class="pd-menu">
        <a href="cart.html" onclick="passProfileToCart()" class="pd-item"><span class="pdi">🛒</span>View Cart</a>
        <a href="orders.html" class="pd-item"><span class="pdi">📋</span>My Orders</a>
        <button class="pd-item danger" onclick="doLogout()"><span class="pdi">🚪</span>Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header rv">
    <div class="eyebrow"><div class="eyebrow-dot"></div><div class="eyebrow-text">Browse &amp; Shop</div></div>
    <div class="page-title">Our <span>Products</span></div>
    <div class="page-desc">Browse our catalogue, add items to cart and place your Cash on Delivery order.</div>
  </div>
  <div class="filter-bar rv">
    <div class="filter-tabs">
      <button class="filt on" onclick="setFilter('all',this)">All</button>
      <button class="filt"    onclick="setFilter('chairs',this)">Chairs &amp; Stools</button>
      <button class="filt"    onclick="setFilter('buckets',this)">Buckets</button>
      <button class="filt"    onclick="setFilter('household',this)">Household</button>
    </div>
    <div class="search-wrap">
      <span style="color:var(--gold);font-size:14px;flex-shrink:0">🔍</span>
      <input type="text" placeholder="Search products…" oninput="setSearch(this.value)"/>
    </div>
  </div>
  <div class="pgrid" id="pgrid"><div class="loading"><div class="spinner"></div>Loading…</div></div>
</div>

<a href="cart.html" class="cart-fab" id="cartFab">
  🛒 View Cart <span class="cart-fab-count" id="cartFabCount">0</span>
</a>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();
let currentUser=null, cart=[], allProducts=[], activeFilter='all', searchQuery='';

const DEFAULTS=[
  {id:'p1',name:'Plastic Chairs',cat:'chairs',price:450,tag:'Popular',emoji:'🪑',img:'',desc:'Durable lightweight chairs. Multiple colours.'},
  {id:'p2',name:'Garden Chairs',cat:'chairs',price:650,tag:'',emoji:'🛋️',img:'',desc:'Weather-resistant outdoor chairs.'},
  {id:'p3',name:'Baby High Chairs',cat:'chairs',price:850,tag:'',emoji:'👶',img:'',desc:'Safe sturdy high chairs for toddlers.'},
  {id:'p4',name:'Plastic Stools',cat:'chairs',price:250,tag:'Wholesale',emoji:'🪑',img:'',desc:'Versatile stools for any room.'},
  {id:'p5',name:'Step Stools',cat:'chairs',price:380,tag:'',emoji:'🪜',img:'',desc:'Anti-slip step stools.'},
  {id:'p6',name:'Storage Buckets',cat:'buckets',price:180,tag:'Best Seller',emoji:'🪣',img:'',desc:'Heavy-duty buckets with lids.'},
  {id:'p7',name:'Bathroom Buckets',cat:'buckets',price:120,tag:'',emoji:'🪣',img:'',desc:'Premium quality bathroom buckets.'},
  {id:'p8',name:'Laundry Baskets',cat:'buckets',price:220,tag:'',emoji:'🧺',img:'',desc:'Spacious ventilated laundry baskets.'},
  {id:'p9',name:'Storage Containers',cat:'household',price:160,tag:'New',emoji:'📦',img:'',desc:'Airtight containers and storage boxes.'},
  {id:'p10',name:'Cleaning Products',cat:'household',price:200,tag:'',emoji:'🧹',img:'',desc:'Mops, brooms, dustpans and more.'},
  {id:'p11',name:'Kitchenware',cat:'household',price:350,tag:'',emoji:'🍽️',img:'',desc:'Plates, bowls, cups and trays.'},
  {id:'p12',name:'Shelves & Racks',cat:'household',price:750,tag:'',emoji:'🗄️',img:'',desc:'Multi-tier storage racks.'},
];

auth.onAuthStateChanged(async user=>{
  if(!user){window.location.href='login.html';return;}
  // Check approval
  if(!ADMIN_EMAILS.includes(user.email)){
    try{
      const doc=await db.collection('users').doc(user.uid).get();
      if(doc.exists && doc.data().approved===false){
        await auth.signOut();
        window.location.href='login.html';
        return;
      }
    }catch(e){}
  }
  currentUser=user;
  // load user profile for avatar
  loadUserProfile(user);
  loadCart();
  try{
    const snap=await db.collection('products').get();
    allProducts=snap.empty?DEFAULTS:snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch{allProducts=DEFAULTS;}
  renderProducts();
  initReveal();
});

// Profile dropdown
function toggleDropdown(){
  document.getElementById('profileDropdown').classList.toggle('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.profile-wrap')) document.getElementById('profileDropdown').classList.remove('open');
});

async function loadUserProfile(user){
  const init = (user.email||'?')[0].toUpperCase();
  document.getElementById('avatarInit').textContent = init;
  document.getElementById('pdInit').textContent     = init;
  document.getElementById('pdEmail').textContent    = user.email||'';
  document.getElementById('pdName').textContent     = user.email.split('@')[0];

  try{
    const [uDoc, oSnap] = await Promise.all([
      db.collection('users').doc(user.uid).get(),
      db.collection('orders').where('userId','==',user.uid).get()
    ]);

    // Populate order count stat
    document.getElementById('pdStatOrders').textContent = oSnap.size;

    // Cart items count
    const cartCount = cart.reduce((s,i)=>s+i.qty, 0);
    document.getElementById('pdStatCart').textContent = cartCount;

    if(uDoc.exists){
      const d = uDoc.data();
      const name = d.name || user.email.split('@')[0];
      document.getElementById('pdName').textContent  = name;
      document.getElementById('pdPhone').textContent = d.phone ? '📞 '+d.phone : '';

      // Member since
      if(d.createdAt){
        const joined  = d.createdAt.toDate();
        const days    = Math.floor((Date.now()-joined.getTime())/(1000*60*60*24));
        const dateStr = joined.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
        document.getElementById('pdSince').textContent = 'Member since '+dateStr;
        document.getElementById('pdStatDays').textContent = days;
      }

      // Pre-fill edit fields
      document.getElementById('editName').value  = d.name  || '';
      document.getElementById('editPhone').value = d.phone || '';
      document.getElementById('editAddr').value  = d.defaultAddress || '';
      document.getElementById('editCity').value  = d.defaultCity    || '';
      document.getElementById('editPin').value   = d.defaultPin     || '';

      if(d.photoURL){ setAvatarImg(d.photoURL); }
    }
  }catch(e){
    document.getElementById('pdName').textContent = user.email.split('@')[0];
  }
}

async function saveProfile(){
  const btn = document.querySelector('.pd-save-btn');
  if(!btn) return;
  btn.disabled = true; btn.textContent = 'Saving…';
  const g = id => document.getElementById(id);
  const name  = g('editName')  ? g('editName').value.trim()  : '';
  const phone = g('editPhone') ? g('editPhone').value.trim() : '';
  const addr  = g('editAddr')  ? g('editAddr').value.trim()  : '';
  const city  = g('editCity')  ? g('editCity').value.trim()  : '';
  const pin   = g('editPin')   ? g('editPin').value.trim()   : '';
  try{
    await db.collection('users').doc(currentUser.uid).set({
      name, phone,
      defaultAddress: addr,
      defaultCity:    city,
      defaultPin:     pin,
    },{merge:true});
    // Safely update display elements (only exist on products.html)
    if(g('pdName'))    g('pdName').textContent    = name || currentUser.email.split('@')[0];
    if(g('avatarInit')) g('avatarInit').textContent = (name||currentUser.email)[0].toUpperCase();
    if(g('pdInit'))    g('pdInit').textContent    = (name||currentUser.email)[0].toUpperCase();
    if(g('pdPhone'))   g('pdPhone').textContent   = phone ? '📞 '+phone : '';
    if(g('pdSaveMsg')){ g('pdSaveMsg').textContent='✅ Saved!'; setTimeout(()=>{ if(g('pdSaveMsg')) g('pdSaveMsg').textContent=''; },2500); }
  }catch(e){
    if(g('pdSaveMsg')) g('pdSaveMsg').textContent = '❌ '+e.message;
  }
  btn.disabled=false; btn.textContent='💾 Save Changes';
}

function setAvatarImg(url){
  const na = document.getElementById('navAvatar');
  if(na) na.innerHTML = `<img src="${url}" alt="profile">`;
  const pa = document.getElementById('pdAvatar');
  if(pa) pa.innerHTML = `<img src="${url}" alt="profile">`;
}

async function uploadProfilePhoto(input){
  const file = input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('⚠ Please pick an image file'); return; }
  showToast('⏳ Uploading photo…');
  // Compress to max 200x200 and quality 0.7 so it fits in Firestore (1MB doc limit)
  const img = new Image();
  const objURL = URL.createObjectURL(file);
  img.onload = async () => {
    URL.revokeObjectURL(objURL);
    const MAX = 200;
    let w = img.width, h = img.height;
    if(w > h){ if(w > MAX){ h = Math.round(h * MAX/w); w = MAX; } }
    else       { if(h > MAX){ w = Math.round(w * MAX/h); h = MAX; } }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataURL = canvas.toDataURL('image/jpeg', 0.7);
    try{
      await db.collection('users').doc(currentUser.uid).set({ photoURL: dataURL }, {merge:true});
      setAvatarImg(dataURL);
      showToast('✅ Profile photo updated!');
    }catch(err){ showToast('❌ Save error: '+err.message); }
  };
  img.onerror = () => showToast('❌ Could not read image');
  img.src = objURL;
}

function passProfileToCart(){
  // Save default delivery info to sessionStorage for cart to pre-fill
  try{
    const addr = document.getElementById('editAddr').value.trim();
    const city = document.getElementById('editCity').value.trim();
    const pin  = document.getElementById('editPin').value.trim();
    if(addr) sessionStorage.setItem('ss_def_addr', addr);
    if(city) sessionStorage.setItem('ss_def_city', city);
    if(pin)  sessionStorage.setItem('ss_def_pin',  pin);
  }catch(e){}
}
function doLogout(){auth.signOut().then(()=>window.location.href='login.html');}

function renderProducts(){
  let list=allProducts;
  if(activeFilter!=='all') list=list.filter(p=>p.cat===activeFilter);
  if(searchQuery) list=list.filter(p=>p.name.toLowerCase().includes(searchQuery)||p.desc.toLowerCase().includes(searchQuery));
  const grid=document.getElementById('pgrid');
  if(!list.length){grid.innerHTML='<div class="empty-state"><div class="ei">🔍</div><p>No products found.</p></div>';return;}
  grid.innerHTML=list.map(p=>{
    const inCart=cart.some(c=>c.id===p.id);
    const vis=p.img?`<img src="${p.img}" alt="${p.name}">`:`<div class="pvisual-emoji">${p.emoji||'📦'}</div>`;
    return `<div class="pcard rv">
      <div class="pvisual">${vis}${p.tag?`<span class="ptag">${p.tag}</span>`:''}</div>
      <div class="pbody">
        <div class="pcat">${p.cat}</div>
        <div class="pname">${p.name}</div>
        <div class="pdesc">${p.desc}</div>
        <div class="pfoot">
          <div class="pprice">₹${p.price} <small>/unit</small></div>
          <button class="add-btn ${inCart?'added':''}" id="ab-${p.id}" onclick="addToCart('${p.id}','${p.name}',${p.price},'${p.emoji||'📦'}')">
            ${inCart?'✓ Added':'+ Cart'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
  initReveal();
}

function setFilter(cat,btn){document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');activeFilter=cat;renderProducts();}
function setSearch(q){searchQuery=q.toLowerCase();renderProducts();}

function cartKey(){return 'ss_cart_'+currentUser.uid;}
function loadCart(){try{cart=JSON.parse(localStorage.getItem(cartKey()))||[];}catch{cart=[];}updateCartUI();}
function saveCart(){
  localStorage.setItem(cartKey(),JSON.stringify(cart));
  updateCartUI();
  // Keep profile stat in sync
  const el=document.getElementById('pdStatCart');
  if(el) el.textContent=cart.reduce((s,i)=>s+i.qty,0);
}
function updateCartUI(){
  const total=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartFabCount').textContent=total;
  document.getElementById('cartFab').style.display=total>0?'flex':'none';
}
function addToCart(id,name,price,emoji){
  const ex=cart.find(c=>c.id===id);
  if(ex){ex.qty++;}else{cart.push({id,name,price,emoji,qty:1});}
  saveCart();
  // Redirect straight to cart
  window.location.href='cart.html';
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function initReveal(){const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.08});document.querySelectorAll('.rv:not(.in)').forEach(el=>obs.observe(el));}
window.addEventListener('scroll',()=>document.getElementById('topNav').classList.toggle('scrolled',window.scrollY>20));
</script>
</body>
</html>
